<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA BITES | Cosmic Cannabis Confections</title>
    <meta name="description" content="Premium cannabis-infused cookies and gummies. Lab-tested, precisely dosed, deliciously elevated.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cosmic: '#0a0a0f',
                        nova: '#7c3aed',
                        starlight: '#f8fafc',
                        galaxy: '#3b82f6',
                        psychedelic: '#ec4899',
                        cookie: '#f59e0b',
                        gummy: '#10b981',
                        tripple: '#06b6d4',
                        'space-black': '#121212',
                    },
                    fontFamily: {
                        'space': ['Space Grotesk', 'system-ui', 'sans-serif'],
                        'comic': ['Comic Neue', 'cursive'],
                    },
                    animation: {
                        float: 'float 6s ease-in-out infinite',
                        pulseGentle: 'pulse-gentle 4s cubic-bezier(0.4,0,0.6,1) infinite',
                        morph: 'morph 8s ease-in-out infinite',
                        spinSlow: 'spin 20s linear infinite',
                        breathe: 'breathe 4s ease-in-out infinite',
                        twinkle: 'twinkle 2s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {'0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' }},
                        pulseGentle: {'0%,100%': { opacity: '1' }, '50%': { opacity: '0.7' }},
                        morph: {'0%,100%': { borderRadius: '60% 40% 30% 70% / 60% 30% 70% 40%' }, '50%': { borderRadius: '30% 60% 70% 40% / 50% 60% 30% 60%' }},
                        breathe: {'0%,100%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.05)' }},
                        twinkle: {'0%,100%': { opacity: '0.2' }, '50%': { opacity: '1' }},
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Comic+Neue:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        html, body { font-family: 'Inter', sans-serif; background-color: #0a0a0f; color: #f8fafc; overflow-x: hidden; }
        .space-font { font-family: 'Space Grotesk', system-ui, sans-serif; }
        .comic-font { font-family: 'Comic Neue', cursive; }
        .gradient-text { background: linear-gradient(90deg, #7c3aed, #ec4899, #06b6d4); -webkit-background-clip: text; color: transparent; background-size: 200% auto; animation: gradient 8s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-effect { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border:1px solid rgba(255,255,255,0.1); }
        .product-card { max-width: 100%; transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
        .product-card:hover { transform: translateY(-10px); }
        .squishy-btn { transition: all 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
        .squishy-btn:active { transform: scale(0.95); }

        /* Cosmic animated background */
        .cosmic-bg { position: absolute; inset: 0; overflow: hidden; z-index: -1; }
        .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.6; animation: morph 12s ease-in-out infinite; }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 2s ease-in-out infinite; }
    </style>
</head>

<body class="bg-cosmic text-starlight overflow-x-hidden relative">

<!-- Cosmic Background -->
<div class="cosmic-bg">
    <!-- Blobs -->
    <div class="blob bg-nova w-96 h-96 top-10 left-1/4 animate-morph"></div>
    <div class="blob bg-psychedelic w-72 h-72 bottom-20 right-1/3 animate-morph"></div>
    <div class="blob bg-galaxy w-80 h-80 top-1/2 left-3/4 animate-morph"></div>
    <!-- Stars -->
    <div class="star top-10 left-10 animate-twinkle"></div>
    <div class="star top-20 right-20 animate-twinkle"></div>
    <div class="star bottom-10 left-20 animate-twinkle"></div>
    <div class="star bottom-20 right-40 animate-twinkle"></div>
</div>

<!-- Navigation -->
<nav class="fixed w-full z-50 glass-effect py-4">
    <div class="container mx-auto px-6 flex justify-between items-center">
        <div class="space-font text-2xl font-bold">
            <span class="gradient-text">NOVA</span> <span class="text-starlight">BITES</span>
        </div>
        <div class="hidden md:flex space-x-8">
            <a href="#products" class="hover:text-nova transition-colors space-font">Products</a>
            <a href="#experience" class="hover:text-nova transition-colors space-font">Experience</a>
            <a href="#story" class="hover:text-nova transition-colors space-font">Our Story</a>
            <a href="#lab" class="hover:text-nova transition-colors space-font">Lab Results</a>
        </div>
        <div class="flex items-center space-x-4">
            <button id="cart-btn" class="relative squishy-btn">
                <i data-lucide="shopping-cart" class="w-6 h-6 hover:text-nova transition-colors"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-psychedelic text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </button>
            <button id="menu-btn" class="md:hidden squishy-btn">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
        </div>
    </div>
    <div id="mobile-menu" class="md:hidden absolute top-full left-0 w-full glass-effect py-4 hidden">
        <div class="container mx-auto px-6 flex flex-col space-y-4">
            <a href="#products" class="py-2 hover:text-nova transition-colors space-font">Products</a>
            <a href="#experience" class="py-2 hover:text-nova transition-colors space-font">Experience</a>
            <a href="#story" class="py-2 hover:text-nova transition-colors space-font">Our Story</a>
            <a href="#lab" class="py-2 hover:text-nova transition-colors space-font">Lab Results</a>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section class="min-h-screen flex items-center justify-center relative pt-16 px-6">
    <div class="container mx-auto text-center relative z-10">
        <h1 class="text-5xl md:text-7xl font-bold space-font mb-6"><span class="gradient-text">Cosmic</span> <span>Confections</span></h1>
        <p class="text-xl md:text-2xl max-w-md mx-auto mb-10 opacity-90">
            Premium cannabis-infused cookies & gummies that take your taste buds 
            <span class="comic-font text-cookie font-bold">and consciousness</span> 
            on an intergalactic journey.
        </p>
        <div class="flex flex-col md:flex-row gap-4 justify-center mb-16">
            <a href="#products" class="squishy-btn px-8 py-4 bg-nova text-starlight rounded-full font-bold space-font hover:bg-opacity-90 transition-all">Explore Products</a>
            <a href="#experience" class="squishy-btn px-8 py-4 glass-effect text-starlight rounded-full font-bold space-font hover:bg-white hover:bg-opacity-10 transition-all">Take the Quiz</a>
        </div>
        <div class="flex justify-center gap-6 relative z-10">
            <img src="https://via.placeholder.com/200x200?text=Cookie" class="rounded-2xl shadow-lg animate-float" alt="Cosmic Cookie">
            <img src="https://via.placeholder.com/200x200?text=Gummy" class="rounded-2xl shadow-lg animate-float" alt="Cosmic Gummy">
        </div>
    </div>
</section>

<!-- Other sections remain same as previous version -->

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    // Hamburger menu toggle
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    menuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });
</script>
</body>
</html>
